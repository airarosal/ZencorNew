<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zencor | Contact Us</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="images/zencor-logo.png" alt="Zencor Logo">
    </div>
    <nav class="nav-menu" id="nav-menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <h1>Get in Touch</h1>
      <p>Got questions about your crops? We are ready to help.</p>
      
      <div class="contact-container">
        <div class="contact-info">
          <h3>Head Office</h3>
          <p><strong>Address:</strong><br> Brgy. San Bartolome, Santa Ana, Pampanga</p>
          <p><strong>Phone:</strong><br> 0917 700 1857</p>
          <p><strong>Email:</strong><br> zencor2015@gmail.com</p>
          
          <div style="margin-top: 20px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <iframe 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3851.644976721066!2d120.7681!3d15.1235!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3396f2649a377d01%3A0x6b8655866164058b!2sSanta%20Ana%2C%20Pampanga!5e0!3m2!1sen!2sph!4v1700000000000!5m2!1sen!2sph" 
              width="100%" 
              height="250" 
              style="border:0;" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>

        <form class="contact-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your Email" required>
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
          <button type="submit" class="btn-submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p>© 2025 Zencor | Zeal Ecological Nature Corporation</p>
      <div class="social-icons">
        <a href="https://www.facebook.com/share/WHDDPJVZPULnqZBW/?mibextid=LQQJ4d" target="_blank"><img src="images/facebook.png" alt="Facebook"></a>
        <a href="mailto:zencor2015@gmail.com"><img src="images/email.png" alt="Email"></a>
      </div>
    </div>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    if(hamburger){ hamburger.addEventListener('click', () => { navMenu.classList.toggle('show'); }); }
  </script>
</body>
</html>
